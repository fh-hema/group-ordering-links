<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Group Ordering Deeplink</title>
  <meta name="description"
    content="Build and test group order deep links.">
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
  <header class="site-header">
    <div class="container">
      <h1>Group Order Deep Link Test</h1>
      <p class="subtitle">Exact scenarios list</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <div class="scenarios">
        <div class="scenarios-head">
          <div class="col index">#</div>
          <div class="col scenario">Creator Type</div>
          <div class="col actions">Actions</div>
        </div>

        <div class="scenarios-row">
          <div class="col index">1</div>
          <div class="col scenario">
            <div class="title">Desktop_Chrome</div>
            <div class="url">https://t2s.app/kBWYx</div>
            <div class="input-group">
              <input type="text" class="url-input" placeholder="Enter new URL..." />
              <button class="btn update">Update</button>
            </div>
          </div>
          <div class="col actions">
            <button class="btn open"
              data-url="https://t2s.app/kBWYx">Open</button>
            <button class="btn btn--secondary copy"
              data-url="https://t2s.app/kBWYx">Copy URL</button>
          </div>
        </div>

        <div class="scenarios-row">
          <div class="col index">2</div>
          <div class="col scenario">
            <div class="title">Desktop_Safari</div>
            <div class="url">https://t2s.app/w0i1R</div>
            <div class="input-group">
              <input type="text" class="url-input" placeholder="Enter new URL..." />
              <button class="btn update">Update</button>
            </div>
          </div>
          <div class="col actions">
            <button class="btn open" data-url="https://t2s.app/Rzrwe">Open</button>
            <button class="btn btn--secondary copy" data-url="https://t2s.app/Rzrwe">Copy
              URL</button>
          </div>
        </div>

        <div class="scenarios-row">
          <div class="col index">3</div>
          <div class="col scenario">
            <div class="title">Mobile_Chrome</div>
            <div class="url">https://t2s.app/HKNAJ</div>
            <div class="input-group">
              <input type="text" class="url-input" placeholder="Enter new URL..." />
              <button class="btn update">Update</button>
            </div>
          </div>
          <div class="col actions">
            <button class="btn open" data-url="https://t2s.app/HKNAJ">Open</button>
            <button class="btn btn--secondary copy" data-url="https://t2s.app/HKNAJ">Copy
              URL</button>
          </div>
        </div>

        <div class="scenarios-row">
          <div class="col index">4</div>
          <div class="col scenario">
            <div class="title">Mobile_Safari</div>
            <div class="url">https://t2s.app/Cd9An</div>
            <div class="input-group">
              <input type="text" class="url-input" placeholder="Enter new URL..." />
              <button class="btn update">Update</button>
            </div>
          </div>
          <div class="col actions">
            <button class="btn open" data-url="https://t2s.app/DJP12">Open</button>
            <button class="btn btn--secondary copy" data-url="https://t2s.app/DJP12">Copy
              URL</button>
          </div>
        </div>

        <div class="scenarios-row">
          <div class="col index">5</div>
          <div class="col scenario">
            <div class="title">AOS 12.5</div>
            <div class="url">https://t2s.app/DGAQ9</div>

              <input type="text" class="url-input" placeholder="Enter new URL..." />

          </div>
          <div class="col actions">
            <button class="btn open" data-url="https://t2s.app/DGAQ9">Open</button>
            <button class="btn btn--secondary copy" data-url="https://t2s.app/DGAQ9">Copy URL</button>
          </div>
        </div>

        <div class="scenarios-row">

            <button class="btn btn--secondary copy" data-url="https://t2s.app/xqziQ">Copy URL</button>
          </div>
        </div>

      </div>
    </section>
  </main>

  <script src="./script.js" defer></script>
</body>

</html>
